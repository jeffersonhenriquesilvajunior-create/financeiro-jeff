<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<meta name="application-name" content="Financeiro Jeff"/>
<title>FINANCEIRO — JEFF</title>

<!-- PWA Manifest inline via data URI -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Financeiro%20%E2%80%94%20Jeff%22%2C%22short_name%22%3A%22Fin.%20Jeff%22%2C%22description%22%3A%22Sistema%20financeiro%20pessoal%20LCARS%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23080510%22%2C%22theme_color%22%3A%22%23080510%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2527http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2527%2520viewBox%3D%270%25200%252096%252096%2527%253E%253Crect%2520width%3D%252796%2527%2520height%3D%252796%2527%2520fill%3D%2527%252523080510%2527%2F%253E%253Cpath%2520d%3D%2527M48%25204L86%252088Q86%252094%252080%252096L16%252096Q10%252094%252010%252088Z%2527%2520fill%3D%2527none%2527%2520stroke%3D%2527%252523ff9900%2527%2520stroke-width%3D%25274%2527%2F%253E%253Cpath%2520d%3D%2527M16%252096Q48%252074%252080%252096%2527%2520fill%3D%2527none%2527%2520stroke%3D%2527%252523ff9900%2527%2520stroke-width%3D%25274%2527%2F%253E%253Cpath%2520d%3D%2527M48%252018L52%252044L66%252038L53%252052L66%252066L52%252060L48%252082L44%252060L30%252066L43%252052L30%252038L44%252044Z%2527%2520fill%3D%2527%252523ff9900%2527%2F%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D"/>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080510;
  --bg2:#0d0a1a;
  --bg3:#120f20;
  --bg4:#1a1630;
  --border:#2a2050;
  --lcars-orange:#ff9900;
  --lcars-peach:#ffcc99;
  --lcars-tan:#cc9966;
  --lcars-blue:#9999ff;
  --lcars-lblue:#ccccff;
  --lcars-pink:#cc6699;
  --lcars-purple:#9966cc;
  --lcars-red:#ff3333;
  --lcars-green:#33cc66;
  --lcars-yellow:#ffff33;
  --text:#f0e8ff;
  --muted:#8878aa;
  --dim:#3d3560;
  --font-head:'Orbitron',monospace;
  --font-body:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ── SCANLINE OVERLAY ── */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:999}

/* ── HEADER LCARS ── */
.header{flex-shrink:0;display:flex;align-items:stretch;background:var(--bg);z-index:50;height:64px}
.header-left{width:90px;display:flex;flex-direction:column;flex-shrink:0}
.header-left-top{background:var(--lcars-orange);height:22px;border-radius:0 0 0 0}
.header-left-pill{background:var(--lcars-orange);flex:1;border-radius:0 0 0 22px;margin-top:2px}
.header-center{flex:1;display:flex;flex-direction:column;padding:0 14px;justify-content:center;border-bottom:3px solid var(--lcars-orange);margin-left:6px}
.header-title{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--lcars-orange);letter-spacing:3px;text-transform:uppercase;line-height:1}
.header-sub{font-size:9px;color:var(--lcars-blue);letter-spacing:2px;margin-top:3px;text-transform:uppercase}
.header-right{width:80px;display:flex;flex-direction:column;flex-shrink:0;margin-left:6px}
.header-right-top{background:var(--lcars-blue);height:22px}
.header-right-date{background:var(--lcars-blue);flex:1;border-radius:0 0 22px 0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.header-right-date span{font-family:var(--font-head);font-size:8px;color:var(--bg);letter-spacing:.5px;text-align:center;line-height:1.4;padding:0 4px}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:0 0 84px;scroll-behavior:smooth}
.content::-webkit-scrollbar{display:none}
.page{padding:14px 14px;animation:lcarsIn .3s ease}
@keyframes lcarsIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}

/* ── NAV LCARS ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:stretch;background:var(--bg);padding-bottom:env(safe-area-inset-bottom);height:64px}
.nav-left-bar{width:16px;background:var(--lcars-pink);border-radius:22px 0 0 0;flex-shrink:0;margin-top:3px}
.nav-buttons{flex:1;display:flex;border-top:3px solid var(--lcars-pink);margin-left:4px;margin-right:4px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;background:none;color:var(--muted);cursor:pointer;gap:3px;transition:all .15s;position:relative;padding:8px 2px}
.nav-btn.active{color:var(--lcars-orange)}
.nav-btn.active .nav-icon-wrap{background:var(--lcars-orange)22;border-radius:6px}
.nav-icon-wrap{padding:3px 8px;border-radius:6px;transition:background .15s}
.nav-icon{font-size:17px;line-height:1;display:block}
.nav-label{font-family:var(--font-head);font-size:7px;letter-spacing:.5px;text-transform:uppercase}
.nav-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--lcars-red);color:#fff;border-radius:8px;font-size:8px;font-weight:700;padding:1px 5px;font-family:var(--font-head)}
.nav-right-bar{width:16px;background:var(--lcars-blue);border-radius:0 22px 0 0;flex-shrink:0;margin-top:3px}

/* ── LCARS PANEL ── */
.lcars-panel{display:flex;margin-bottom:12px}
.lcars-side{width:14px;display:flex;flex-direction:column;flex-shrink:0}
.lcars-side-pill{border-radius:22px 0 0 22px;flex:1}
.lcars-body{flex:1;border-top:2px solid;border-bottom:2px solid;border-right:2px solid;border-radius:0 10px 10px 0;padding:12px 14px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi-card{border-radius:0;padding:12px 14px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.kpi-card.full{grid-column:1/-1}
.kpi-label{font-family:var(--font-head);font-size:8px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.kpi-value{font-family:var(--font-head);font-size:17px;font-weight:700;line-height:1}
.kpi-icon{font-size:18px;margin-bottom:5px}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;gap:0;margin-bottom:12px}
.sec-pill{height:28px;width:8px;border-radius:8px 0 0 8px;flex-shrink:0}
.sec-bar{height:3px;flex:1;margin:0}
.sec-title{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:0 10px;white-space:nowrap;background:var(--bg)}

/* ── BAR ── */
.bar-wrap{background:var(--bg4);height:5px;overflow:hidden;margin-top:5px;border-radius:0}
.bar-fill{height:100%;transition:width .5s ease}

/* ── LIST ITEMS ── */
.list-item{border-left:4px solid var(--lcars-blue);background:var(--bg3);padding:11px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.list-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg4)}
.list-content{flex:1;min-width:0}
.list-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-sub{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--font-head);letter-spacing:.3px}
.list-amount{font-family:var(--font-head);font-weight:700;font-size:14px;white-space:nowrap;flex-shrink:0}
.list-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px;flex-shrink:0}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;background:var(--bg4);padding:5px 12px;font-family:var(--font-head);font-size:9px;letter-spacing:1px;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;text-transform:uppercase}
.pill.active{border-color:var(--lcars-orange);color:var(--lcars-orange)}
.pills-row{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.pills-row::-webkit-scrollbar{display:none}

/* ── FAB ── */
.fab{position:fixed;right:14px;bottom:78px;width:50px;height:50px;background:var(--lcars-orange);border:none;color:var(--bg);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,153,0,.5),0 0 40px rgba(255,153,0,.2);transition:all .15s;z-index:90;font-weight:300;line-height:1;border-radius:0 16px 0 16px;font-family:var(--font-head)}
.fab:active{transform:scale(.92);box-shadow:0 0 10px rgba(255,153,0,.4)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(4,2,12,.85);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(8px)}
.modal-sheet{background:var(--bg2);border-top:3px solid var(--lcars-orange);padding:20px 18px calc(env(safe-area-inset-bottom) + 20px);max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:3px;background:var(--lcars-orange);margin:0 auto 16px;opacity:.5}
.modal-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--lcars-orange);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* ── FORM ── */
.field{margin-bottom:13px}
.field label{display:block;font-family:var(--font-head);font-size:8px;color:var(--lcars-blue);font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--bg4);border:none;border-bottom:2px solid var(--lcars-blue);padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:var(--font-body);-webkit-appearance:none;appearance:none;border-radius:0;transition:border-color .2s}
.field textarea{resize:none;min-height:66px}
.field input:focus,.field select:focus,.field textarea:focus{border-bottom-color:var(--lcars-orange)}
.field select option{background:var(--bg3)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:13px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-head);transition:all .15s;letter-spacing:1.5px;text-transform:uppercase}
.btn:active{opacity:.8}
.btn-primary{background:var(--lcars-orange);color:var(--bg)}
.btn-ghost{background:var(--bg4);color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:var(--lcars-red);color:#fff}
.btn-sm{padding:6px 14px;font-size:9px;flex:0;letter-spacing:1px}

/* ── TOGGLE ── */
.toggle-row{display:flex;background:var(--bg4);padding:2px;gap:2px;margin-bottom:14px}
.toggle-opt{flex:1;padding:9px;text-align:center;font-size:9px;font-weight:700;cursor:pointer;transition:all .15s;border:none;background:none;color:var(--muted);font-family:var(--font-head);letter-spacing:1px;text-transform:uppercase}
.toggle-opt.active{background:var(--lcars-orange);color:var(--bg)}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--lcars-orange),var(--lcars-blue))}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-20px;top:4px;width:8px;height:8px;background:var(--lcars-orange);border:1px solid var(--bg);transform:rotate(45deg)}
.tl-date{font-family:var(--font-head);font-size:8px;color:var(--muted);margin-bottom:3px;letter-spacing:1.5px;text-transform:uppercase}
.tl-card{background:var(--bg3);border-left:3px solid var(--lcars-orange);padding:10px 12px}
.tl-desc{font-size:13px;font-weight:600;color:var(--text)}
.tl-reason{font-size:11px;color:var(--lcars-blue);margin-top:3px;font-style:italic}
.tl-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.tl-amount{font-family:var(--font-head);font-size:13px;font-weight:700}
.tl-cat{font-family:var(--font-head);font-size:8px;padding:2px 8px;background:var(--bg4);color:var(--muted);letter-spacing:.5px}

/* ── INVEST ── */
.invest-hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--lcars-green)44;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.invest-hero::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border:2px solid var(--lcars-green)22;border-radius:50%}
.invest-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border:2px solid var(--lcars-green)11;border-radius:50%}
.invest-total-label{font-family:var(--font-head);font-size:8px;color:var(--lcars-green);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.invest-total{font-family:var(--font-head);font-size:28px;font-weight:900;color:var(--text);line-height:1}
.invest-sub{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--font-head);font-size:9px;letter-spacing:.5px}

/* ── PROJECTION ── */
.proj-panel{background:var(--bg3);border:1px solid var(--lcars-purple)44;padding:14px;margin-bottom:10px}
.proj-title{font-family:var(--font-head);font-size:9px;font-weight:700;color:var(--lcars-purple);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.proj-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)66}
.proj-row:last-child{border:none}
.proj-period{font-family:var(--font-head);font-size:9px;color:var(--muted);letter-spacing:1px}
.proj-value{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--lcars-green)}

/* ── FIXED ── */
.fixed-item{background:var(--bg3);border-left:4px solid var(--lcars-blue);padding:12px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.fixed-inactive{border-left-color:var(--dim)!important;opacity:.45}

/* ── DAS ALERT ── */
.das-panel{background:var(--bg3);border:1px solid var(--lcars-pink)55;padding:13px 14px;margin-bottom:12px;display:flex;gap:12px;align-items:center;position:relative}
.das-panel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--lcars-pink)}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:34px!important}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}

/* ── TOAST ── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg3);border-left:4px solid var(--lcars-orange);padding:10px 18px;font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--lcars-orange);z-index:300;animation:toastIn .2s ease;white-space:nowrap;letter-spacing:1px;text-transform:uppercase}
@keyframes toastIn{from{opacity:0;top:6px}to{opacity:1;top:16px}}

/* ── EMPTY ── */
.empty{text-align:center;padding:36px 20px;color:var(--dim);font-family:var(--font-head);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;line-height:2}
.empty-icon{font-size:32px;margin-bottom:10px;display:block;opacity:.3}

/* ── MISC ── */
.blip{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lcars-green);box-shadow:0 0 6px var(--lcars-green);animation:blip 2s infinite}
@keyframes blip{0%,100%{opacity:1}50%{opacity:.3}}
*{scrollbar-width:none}
</style>
</head>
<body>

<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="header-left-top"></div>
      <div class="header-left-pill"></div>
    </div>
    <div class="header-center">
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="18" height="22" viewBox="0 0 90 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M45 4 L84 88 Q84 94 78 96 L12 96 Q6 94 6 88 Z" fill="none" stroke="#ff9900" stroke-width="4" stroke-linejoin="round"/>
          <path d="M12 96 Q45 74 78 96" fill="none" stroke="#ff9900" stroke-width="4"/>
          <path d="M45 18 L49 42 L62 36 L50 50 L62 64 L49 58 L45 82 L41 58 L28 64 L40 50 L28 36 L41 42 Z" fill="#ff9900"/>
        </svg>
        <div class="header-title">Financeiro — Jeff</div>
      </div>
      <div class="header-sub">Coord. Operacional · PJ · <span class="blip"></span> Online</div>
    </div>
    <div class="header-right">
      <div class="header-right-top"></div>
      <div class="header-right-date"><span id="headerDate">—</span></div>
    </div>
  </header>

  <div class="content" id="content"></div>
  <nav class="nav" id="nav">
    <div class="nav-left-bar"></div>
    <div class="nav-buttons" id="navButtons"></div>
    <div class="nav-right-bar"></div>
  </nav>
</div>

<button id="fabBtn" class="fab">+</button>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
// ─── STORE ───────────────────────────────────────────────────────────────────
const STORE_KEY='jeff_fin_v1';
function loadData(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||defaultData();}catch{return defaultData();}}
function saveData(d){localStorage.setItem(STORE_KEY,JSON.stringify(d));}
function defaultData(){return{
  transactions:[],loans:[],splits:[],investments:[],budget:{},
  fixedExpenses:[
    {id:uid(),name:'Aluguel (minha parte)',amount:0,category:'moradia',day:5,active:true,shared:true},
    {id:uid(),name:'Internet (minha parte)',amount:0,category:'moradia',day:10,active:true,shared:true},
    {id:uid(),name:'Mensalidade Faculdade',amount:0,category:'faculdade',day:10,active:true,shared:false},
    {id:uid(),name:'Academia',amount:0,category:'treino',day:1,active:true,shared:false},
  ],
  fixedIncomes:[
    {id:uid(),name:'Salário PJ',amount:0,category:'receita',day:5,active:true,type:'fixed'},
  ],
  variableIncomes:[],
};}

let DATA=loadData();
function save(){saveData(DATA);}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmt(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);}
function today(){return new Date().toISOString().slice(0,10);}
function now(){return new Date();}

const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const WEEKDAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

const CATS={
  receita:    {label:'Receita PJ',     icon:'⬆', color:'#33cc66'},
  premiacao:  {label:'Premiação/Bônus',icon:'🏆', color:'#ffff33'},
  moradia:    {label:'Moradia',        icon:'🏠', color:'#9999ff'},
  faculdade:  {label:'Faculdade',      icon:'🎓', color:'#cc99ff'},
  treino:     {label:'Treino/Supl.',   icon:'💪', color:'#ff9900'},
  alimentacao:{label:'Alimentação',    icon:'🍽', color:'#ffcc99'},
  lazer:      {label:'Lazer',          icon:'🎮', color:'#cc6699'},
  transporte: {label:'Transporte',     icon:'🚗', color:'#66ccff'},
  impostos:   {label:'Impostos PJ',    icon:'📑', color:'#ff3333'},
  investimento:{label:'Investimento',  icon:'📈', color:'#33cc66'},
  outros:     {label:'Outros',         icon:'📦', color:'#8878aa'},
};

const INVEST_TYPES={
  cdb:    {label:'CDB',          icon:'🏦',color:'#33cc66'},
  lci:    {label:'LCI/LCA',      icon:'🌿',color:'#66ffaa'},
  selic:  {label:'Tesouro Selic',icon:'🇧🇷',color:'#ffff33'},

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg,color='var(--lcars-orange)'){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  el.style.borderLeftColor=color;el.style.color=color;
  document.getElementById('toastRoot').appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(titleStr,bodyHTML,onConfirm,confirmLabel='Confirmar',danger=false){
  const root=document.getElementById('modalRoot');
  root.innerHTML='';
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  const sheet=document.createElement('div');
  sheet.className='modal-sheet';
  sheet.innerHTML=`<div class="modal-handle"></div><div class="modal-title">// ${titleStr}</div><div id="modalBody">${bodyHTML}</div>`;
  const btnRow=document.createElement('div');btnRow.className='btn-row';btnRow.style.marginTop='10px';
  const cancelBtn=document.createElement('button');cancelBtn.className='btn btn-ghost';cancelBtn.textContent='Cancelar';cancelBtn.addEventListener('click',closeModal);
  const confirmBtn=document.createElement('button');confirmBtn.className=`btn ${danger?'btn-danger':'btn-primary'}`;confirmBtn.textContent=confirmLabel;
  confirmBtn.addEventListener('click',()=>{if(onConfirm())closeModal();});
  btnRow.appendChild(cancelBtn);btnRow.appendChild(confirmBtn);
  sheet.appendChild(btnRow);overlay.appendChild(sheet);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  root.appendChild(overlay);
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

function field(label,id,type='text',value='',extra=''){
  return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${esc(value)}" ${extra}/></div>`;
}
function fieldSel(label,id,options,value=''){
  const opts=options.map(([v,l])=>`<option value="${v}"${v===value?' selected':''}>${l}</option>`).join('');
  return `<div class="field"><label>${label}</label><select id="${id}">${opts}</select></div>`;
}
function fieldTA(label,id,value='',placeholder=''){
  return `<div class="field"><label>${label}</label><textarea id="${id}" placeholder="${placeholder}">${esc(value)}</textarea></div>`;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function val(id){const el=document.getElementById(id);return el?el.value:'';}
function fval(id){return parseFloat(val(id))||0;}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard(){
  const n=now(),m=n.getMonth(),y=n.getFullYear();
  const thisMonth=DATA.transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===m&&d.getFullYear()===y;});
  const income=thisMonth.filter(t=>['receita','premiacao'].includes(t.category)).reduce((s,t)=>s+t.amount,0);
  const expenses=thisMonth.filter(t=>!['receita','premiacao','investimento'].includes(t.category)).reduce((s,t)=>s+t.amount,0);
  const invested=thisMonth.filter(t=>t.category==='investimento').reduce((s,t)=>s+t.amount,0);
  const balance=income-expenses-invested;
  const das=income*0.06;
  const pendingLoans=DATA.loans.filter(l=>!l.paid&&l.type==='gave').reduce((s,l)=>s+l.amount,0);
  const pendingSplits=DATA.splits.filter(s=>!s.settled).reduce((s,sp)=>s+sp.myShare,0);
  const totalInvest=DATA.investments.reduce((s,i)=>s+i.currentValue,0);

  const catBreakdown=Object.keys(CATS).filter(k=>!['receita','premiacao','investimento'].includes(k)).map(k=>{
    const spent=thisMonth.filter(t=>t.category===k).reduce((s,t)=>s+t.amount,0);
    const bud=DATA.budget[k]||0;
    if(!spent&&!bud)return'';
    const cat=CATS[k];
    const pct=bud?Math.min(100,Math.round(spent/bud*100)):100;
    const over=bud&&spent>bud;
    return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:11px;color:var(--text)">${cat.icon} ${cat.label}</span>
        <span style="font-family:var(--font-head);font-size:9px;color:${over?'var(--lcars-red)':'var(--muted)'};">${fmt(spent)}${bud?' / '+fmt(bud):''}</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${over?'var(--lcars-red)':cat.color}"></div></div>
    </div>`;
  }).join('');

  return`<div class="page">
    ${secHeader(`${MONTHS[m]} ${y} — Situação Atual`,'var(--lcars-orange)')}

    <div class="kpi-grid">
      ${kpiCard('⬆','Receita do Mês',fmt(income),'var(--lcars-green)')}
      ${kpiCard('⬇','Gastos do Mês',fmt(expenses),'var(--lcars-red)')}
      ${kpiCard('◎','Saldo',fmt(balance),balance>=0?'var(--lcars-green)':'var(--lcars-red)')}
      ${kpiCard('📈','Investido (mês)',fmt(invested),'var(--lcars-purple)')}
    </div>

    ${totalInvest>0?`<div class="invest-hero" style="margin-bottom:12px">
      <div class="invest-total-label">Patrimônio Total Acumulado</div>
      <div class="invest-total">${fmt(totalInvest)}</div>
    </div>`:''}

    ${income>0?`<div class="das-panel">
      <div style="font-size:22px;flex-shrink:0">📑</div>
      <div>
        <div style="font-family:var(--font-head);font-size:8px;color:var(--lcars-pink);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px">DAS — Simples Nacional 6%</div>
        <div style="font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text)">${fmt(das)}</div>
        <div style="font-family:var(--font-head);font-size:8px;color:var(--muted);margin-top:2px;letter-spacing:.5px">VENCE DIA 20 · BASE: ${fmt(income)}</div>
      </div>
    </div>`:''}

    ${pendingLoans>0||pendingSplits>0?`
    <div style="display:flex;gap:8px;margin-bottom:12px">
      ${pendingLoans>0?`<div style="flex:1;background:var(--bg3);border-left:3px solid var(--lcars-green);padding:10px 12px">
        <div style="font-family:var(--font-head);font-size:8px;color:var(--lcars-green);letter-spacing:1.5px;margin-bottom:4px">A RECEBER</div>
        <div style="font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--lcars-green)">${fmt(pendingLoans)}</div>
      </div>`:''}
      ${pendingSplits>0?`<div style="flex:1;background:var(--bg3);border-left:3px solid var(--lcars-blue);padding:10px 12px">
        <div style="font-family:var(--font-head);font-size:8px;color:var(--lcars-blue);letter-spacing:1.5px;margin-bottom:4px">A DIVIDIR</div>
        <div style="font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--lcars-blue)">${fmt(pendingSplits)}</div>
      </div>`:''}
    </div>`:''}

    ${catBreakdown?`
    ${secHeader('Consumo por Categoria','var(--lcars-blue)')}
    <div style="background:var(--bg3);padding:14px;border-left:3px solid var(--lcars-blue)">${catBreakdown}</div>`
    :'<div class="empty"><span class="empty-icon">◎</span>Nenhum lançamento este mês<br>Toque + para iniciar</div>'}
  </div>`;
}

// ─── TIMELINE ────────────────────────────────────────────────────────────────
let tlFilter='all',tlSearch='';

function renderTimeline(){
  let items=[...DATA.transactions];
  if(tlFilter!=='all')items=items.filter(t=>t.category===tlFilter);
  if(tlSearch)items=items.filter(t=>(t.description+(t.reason||'')).toLowerCase().includes(tlSearch.toLowerCase()));
  items.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const grouped={};
  items.forEach(t=>{
    const d=new Date(t.date);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!grouped[key])grouped[key]=[];
    grouped[key].push(t);
  });

  const catPills=[['all','Todas'],...Object.entries(CATS).map(([k,c])=>[k,c.icon+' '+c.label.split('/')[0]])].map(([k,l])=>
    `<span class="pill ${tlFilter===k?'active':''}" onclick="setTlFilter('${k}')">${l}</span>`).join('');

  const groups=Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0])).map(([key,txs])=>{
    const [y,m]=key.split('-');
    const mI=parseInt(m)-1;
    const mIncome=txs.filter(t=>['receita','premiacao'].includes(t.category)).reduce((s,t)=>s+t.amount,0);
    const mExp=txs.filter(t=>!['receita','premiacao','investimento'].includes(t.category)).reduce((s,t)=>s+t.amount,0);
    const tls=txs.map(t=>{
      const cat=CATS[t.category]||CATS.outros;
      const isIn=['receita','premiacao'].includes(t.category);
      const d=new Date(t.date+'T12:00:00');
      return`<div class="tl-item">
        <div class="tl-dot" style="background:${cat.color}"></div>
        <div class="tl-date">${WEEKDAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
        <div class="tl-card" style="border-left-color:${cat.color}">
          <div class="tl-desc">${esc(t.description)}</div>
          ${t.reason?`<div class="tl-reason">// ${esc(t.reason)}</div>`:''}
          <div class="tl-meta">
            <span class="tl-amount" style="color:${isIn?'var(--lcars-green)':'var(--text)'}">${isIn?'+':'-'}${fmt(t.amount)}</span>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="tl-cat">${cat.icon} ${cat.label}</span>
              <button onclick="delTransaction('${t.id}')" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px">✕</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    return`<div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">
        <div style="font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--lcars-orange);letter-spacing:2px">${MONTHS[mI].toUpperCase()} ${y}</div>
        <div style="font-family:var(--font-head);font-size:9px">${mIncome?`<span style="color:var(--lcars-green)">+${fmt(mIncome)}</span> `:''}${mExp?`<span style="color:var(--lcars-red)">-${fmt(mExp)}</span>`:''}</div>
      </div>
      <div class="timeline">${tls}</div>
    </div>`;
  }).join('');

  return`<div class="page">
    ${secHeader('Histórico & Motivos','var(--lcars-orange)')}
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" placeholder="Buscar descrição ou motivo..." value="${esc(tlSearch)}" oninput="setTlSearch(this.value)"
        style="width:100%;background:var(--bg4);border:none;border-bottom:2px solid var(--lcars-blue);padding:9px 10px 9px 32px;color:var(--text);font-size:13px;outline:none;font-family:var(--font-body)"/>
    </div>
    <div class="pills-row">${catPills}</div>
    ${groups||'<div class="empty"><span class="empty-icon">📋</span>Sem registros ainda</div>'}
  </div>`;
}

function setTlFilter(f){tlFilter=f;navigate('timeline');}
function setTlSearch(v){tlSearch=v;renderPage();}
function delTransaction(id){DATA.transactions=DATA.transactions.filter(t=>t.id!==id);save();renderPage();toast('Removido','var(--lcars-red)');}

// ─── INVEST ──────────────────────────────────────────────────────────────────
function renderInvest(){
  const total=DATA.investments.reduce((s,i)=>s+i.currentValue,0);
  const totalIn=DATA.investments.reduce((s,i)=>s+i.invested,0);
  const gain=total-totalIn;
  const gainPct=totalIn?(gain/totalIn*100).toFixed(1):0;

  const rates=[
    {label:'Selic ~13% a.a.',rate:.13},
    {label:'CDB 110% CDI ~13.7%',rate:.137},
    {label:'IPCA+5% ~15% a.a.',rate:.15},
  ];
  const projections=total>0?rates.map(r=>{
    const rows=[{p:'6 meses',t:.5},{p:'1 ano',t:1},{p:'2 anos',t:2},{p:'5 anos',t:5}].map(pd=>
      `<div class="proj-row"><span class="proj-period">${pd.p}</span><span class="proj-value">${fmt(total*Math.pow(1+r.rate,pd.t))}</span></div>`).join('');
    return`<div class="proj-panel"><div class="proj-title">// ${r.label}</div>${rows}</div>`;
  }).join(''):'';

  const items=DATA.investments.map(inv=>{
    const type=INVEST_TYPES[inv.type]||INVEST_TYPES.outros;
    const g=inv.currentValue-inv.invested;
    const gp=inv.invested?(g/inv.invested*100).toFixed(1):0;
    return`<div class="list-item" style="border-left-color:${type.color}">
      <div class="list-icon">${type.icon}</div>
      <div class="list-content">
        <div class="list-title">${esc(inv.name)}</div>
        <div class="list-sub">${type.label} · Aportado: ${fmt(inv.invested)}</div>
        ${g!==0?`<div style="font-family:var(--font-head);font-size:9px;color:${g>0?'var(--lcars-green)':'var(--lcars-red)'};margin-top:3px;letter-spacing:.5px">${g>0?'+':''}${fmt(g)} (${gp}%)</div>`:''}
      </div>
      <div style="text-align:right">
        <div class="list-amount" style="color:var(--lcars-green)">${fmt(inv.currentValue)}</div>
        <button onclick="editInvest('${inv.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--font-head);font-size:8px;letter-spacing:1px;margin-top:3px">EDITAR</button>
      </div>
      <button class="list-del" onclick="delInvest('${inv.id}')">✕</button>
    </div>`;
  }).join('');

  return`<div class="page">
    ${secHeader('Investimentos & Patrimônio','var(--lcars-green)')}
    <div class="invest-hero">
      <div class="invest-total-label">Patrimônio Total</div>
      <div class="invest-total">${fmt(total)}</div>
      ${totalIn>0?`<div class="invest-sub">${gain>=0?'+':''}${fmt(gain)} (${gainPct}%) · aportado ${fmt(totalIn)}</div>`:''}
    </div>
    ${items||'<div class="empty"><span class="empty-icon">📈</span>Nenhum investimento registrado<br>Toque + para adicionar</div>'}
    ${projections?`${secHeader('Projeção do Patrimônio','var(--lcars-purple)')}<div>${projections}</div>`:''}
  </div>`;
}

function delInvest(id){DATA.investments=DATA.investments.filter(i=>i.id!==id);save();renderPage();toast('Removido','var(--lcars-red)');}
function editInvest(id){
  const inv=DATA.investments.find(i=>i.id===id);if(!inv)return;
  const typeOpts=Object.entries(INVEST_TYPES).map(([k,v])=>[k,v.icon+' '+v.label]);
  openModal('Atualizar Investimento',
    fieldSel('Tipo','iType',typeOpts,inv.type)+field('Nome','iName','text',inv.name)+
    field('Valor Aportado (R$)','iInvested','number',inv.invested)+field('Valor Atual (R$)','iCurrent','number',inv.currentValue)+field('Data','iDate','date',inv.date),
    ()=>{if(!val('iName')||!fval('iCurrent'))return false;
      inv.type=val('iType');inv.name=val('iName');inv.invested=fval('iInvested');inv.currentValue=fval('iCurrent');inv.date=val('iDate');
      save();renderPage();toast('Atualizado!');return true;},'Salvar');
}

function delLoan(id){DATA.loans=DATA.loans.filter(l=>l.id!==id);save();renderPage();}

// ─── FIXED ───────────────────────────────────────────────────────────────────
let fixedTab = 'expenses';

function renderFixed(){
  if(!DATA.fixedIncomes) DATA.fixedIncomes=[];
  if(!DATA.variableIncomes) DATA.variableIncomes=[];

  const totalExp  = DATA.fixedExpenses.filter(f=>f.active).reduce((s,f)=>s+f.amount,0);
  const totalInc  = DATA.fixedIncomes.filter(f=>f.active).reduce((s,f)=>s+f.amount,0);
  const balance   = totalInc - totalExp;

  // ── expense items
  const expItems = DATA.fixedExpenses.map(f=>{
    const cat=CATS[f.category]||CATS.outros;
    return`<div class="fixed-item ${f.active?'':'fixed-inactive'}" style="border-left-color:${f.active?cat.color:'var(--dim)'}">
      <div class="list-icon" style="font-size:16px">${cat.icon}</div>
      <div class="list-content">
        <div class="list-title">${esc(f.name)}</div>
        <div class="list-sub">DIA ${f.day||'?'} · ${cat.label}${f.shared?' · Dividida':''}</div>
      </div>
      <div style="font-family:var(--font-head);font-size:14px;font-weight:700;color:${f.active?'var(--lcars-red)':'var(--muted)'};margin-right:8px">${fmt(f.amount)}</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button onclick="editFixed('${f.id}')" style="background:var(--bg4);border:none;color:var(--muted);padding:4px 8px;cursor:pointer;font-family:var(--font-head);font-size:8px">✏</button>
        <button onclick="toggleFixed('${f.id}')" style="background:${f.active?'var(--lcars-green)22':'var(--bg4)'};border:none;color:${f.active?'var(--lcars-green)':'var(--dim)'};padding:4px 8px;cursor:pointer;font-family:var(--font-head);font-size:8px">${f.active?'ON':'OFF'}</button>
      </div>
      <button class="list-del" onclick="delFixed('${f.id}')">✕</button>
    </div>`;
  }).join('') || '<div class="empty" style="padding:16px 0">Nenhuma despesa fixa</div>';

  // ── fixed income items
  const incItems = DATA.fixedIncomes.map(f=>{
    const cat=CATS[f.category]||CATS.receita;
    return`<div class="fixed-item ${f.active?'':'fixed-inactive'}" style="border-left-color:${f.active?'var(--lcars-green)':'var(--dim)'}">
      <div class="list-icon" style="font-size:16px">${cat.icon}</div>
      <div class="list-content">
        <div class="list-title">${esc(f.name)}</div>
        <div class="list-sub">DIA ${f.day||'?'} · ${cat.label}</div>
      </div>
      <div style="font-family:var(--font-head);font-size:14px;font-weight:700;color:${f.active?'var(--lcars-green)':'var(--muted)'};margin-right:8px">${fmt(f.amount)}</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button onclick="editFixedIncome('${f.id}')" style="background:var(--bg4);border:none;color:var(--muted);padding:4px 8px;cursor:pointer;font-family:var(--font-head);font-size:8px">✏</button>
        <button onclick="toggleFixedIncome('${f.id}')" style="background:${f.active?'var(--lcars-green)22':'var(--bg4)'};border:none;color:${f.active?'var(--lcars-green)':'var(--dim)'};padding:4px 8px;cursor:pointer;font-family:var(--font-head);font-size:8px">${f.active?'ON':'OFF'}</button>
      </div>
      <button class="list-del" onclick="delFixedIncome('${f.id}')">✕</button>
    </div>`;
  }).join('') || '<div class="empty" style="padding:16px 0">Nenhuma receita fixa</div>';

  // ── variable income items (this month)
  const m=now().getMonth(), y=now().getFullYear();
  const varItems = DATA.variableIncomes.map(v=>{
    const cat=CATS[v.category]||CATS.premiacao;
    const d=new Date(v.date);
    const thisM = d.getMonth()===m && d.getFullYear()===y;
    return`<div class="fixed-item" style="border-left-color:${cat.color};${!thisM?'opacity:.45':''}">
      <div class="list-icon" style="font-size:16px">${cat.icon}</div>
      <div class="list-content">
        <div class="list-title">${esc(v.name)}</div>
        <div class="list-sub">${cat.label} · ${v.date}${v.note?' · '+esc(v.note):''}</div>
      </div>
      <div style="font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--lcars-yellow);margin-right:8px">${fmt(v.amount)}</div>
      <button class="list-del" onclick="delVarIncome('${v.id}')">✕</button>
    </div>`;
  }).sort((a,b)=>0).join('') || '<div class="empty" style="padding:16px 0">Nenhuma receita variável registrada</div>';

  return`<div class="page">
    ${secHeader('Receitas & Despesas Recorrentes','var(--lcars-orange)')}

    <!-- balance summary -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:var(--bg3);border-left:3px solid var(--lcars-green);padding:10px 12px">
        <div style="font-family:var(--font-head);font-size:7px;color:var(--lcars-green);letter-spacing:1.5px;margin-bottom:4px">ENTRADAS FIXAS</div>
        <div style="font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--lcars-green)">${fmt(totalInc)}</div>
      </div>
      <div style="background:var(--bg3);border-left:3px solid var(--lcars-red);padding:10px 12px">
        <div style="font-family:var(--font-head);font-size:7px;color:var(--lcars-red);letter-spacing:1.5px;margin-bottom:4px">SAÍDAS FIXAS</div>
        <div style="font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--lcars-red)">${fmt(totalExp)}</div>
      </div>
      <div style="background:var(--bg3);border-left:3px solid ${balance>=0?'var(--lcars-blue)':'var(--lcars-pink)'};padding:10px 12px">
        <div style="font-family:var(--font-head);font-size:7px;color:var(--muted);letter-spacing:1.5px;margin-bottom:4px">SALDO FIXO</div>
        <div style="font-family:var(--font-head);font-size:14px;font-weight:700;color:${balance>=0?'var(--lcars-blue)':'var(--lcars-pink)'}">${fmt(balance)}</div>
      </div>
    </div>

    <!-- tabs -->
    <div class="toggle-row" style="margin-bottom:12px">
      <button class="toggle-opt ${fixedTab==='expenses'?'active':''}" onclick="setFixedTab('expenses')">⬇ Despesas</button>
      <button class="toggle-opt ${fixedTab==='income'?'active':''}" onclick="setFixedTab('income')">⬆ Receitas Fixas</button>
      <button class="toggle-opt ${fixedTab==='variable'?'active':''}" onclick="setFixedTab('variable')">🏆 Variáveis</button>
    </div>

    ${fixedTab==='expenses'?`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-family:var(--font-head);font-size:9px;color:var(--muted);letter-spacing:1px">TOTAL: <span style="color:var(--lcars-red)">${fmt(totalExp)}/mês</span></div>
        <button class="btn btn-primary btn-sm" onclick="addFixed()">+ Nova</button>
      </div>
      <div style="background:var(--bg3);border-left:3px solid var(--lcars-orange);padding:11px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-family:var(--font-head);font-size:8px;color:var(--lcars-orange);letter-spacing:1.5px;margin-bottom:2px">LANÇAMENTO MENSAL</div>
          <div style="font-size:11px;color:var(--muted)">Lança todas as despesas ativas no histórico</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="launchFixed()">Lançar</button>
      </div>
      ${expItems}

    `:fixedTab==='income'?`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-family:var(--font-head);font-size:9px;color:var(--muted);letter-spacing:1px">TOTAL: <span style="color:var(--lcars-green)">${fmt(totalInc)}/mês</span></div>
        <button class="btn btn-primary btn-sm" style="background:var(--lcars-green)" onclick="addFixedIncome()">+ Nova</button>
      </div>
      <div style="background:var(--bg3);border-left:3px solid var(--lcars-green);padding:11px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-family:var(--font-head);font-size:8px;color:var(--lcars-green);letter-spacing:1.5px;margin-bottom:2px">LANÇAMENTO MENSAL</div>
          <div style="font-size:11px;color:var(--muted)">Lança salário e receitas fixas no histórico</div>
        </div>
        <button class="btn btn-primary btn-sm" style="background:var(--lcars-green)" onclick="launchFixedIncome()">Lançar</button>
      </div>
      ${incItems}

    `:`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-family:var(--font-head);font-size:9px;color:var(--muted);letter-spacing:1px">PREMIAÇÕES & FREELAS</div>
        <button class="btn btn-primary btn-sm" style="background:var(--lcars-yellow);color:var(--bg)" onclick="addVarIncome()">+ Registrar</button>
      </div>
      <div style="background:var(--bg3);border-left:3px solid var(--lcars-yellow);padding:11px 14px;margin-bottom:10px;font-size:11px;color:var(--muted)">
        <span style="font-family:var(--font-head);font-size:8px;color:var(--lcars-yellow);letter-spacing:1.5px;display:block;margin-bottom:3px">// RECEITAS NÃO RECORRENTES</span>
        Premiações, bônus, freelas e trabalhos avulsos. Registre com valor real quando receber.
      </div>
      ${varItems}
    `}
  </div>`;
}

function setFixedTab(t){fixedTab=t;renderPage();}

function toggleFixed(id){DATA.fixedExpenses=DATA.fixedExpenses.map(f=>f.id===id?{...f,active:!f.active}:f);save();renderPage();}
function delFixed(id){DATA.fixedExpenses=DATA.fixedExpenses.filter(f=>f.id!==id);save();renderPage();}

function launchFixed(){
  const d=today(),m=now().getMonth(),y=now().getFullYear();
  let count=0;
  DATA.fixedExpenses.filter(f=>f.active&&f.amount>0).forEach(f=>{
    const exists=DATA.transactions.some(t=>{const td=new Date(t.date);return td.getMonth()===m&&td.getFullYear()===y&&t.fixedId===f.id;});
    if(!exists){DATA.transactions.push({id:uid(),description:f.name,amount:f.amount,category:f.category,date:d,reason:'Despesa fixa',fixedId:f.id});count++;}
  });
  save();renderPage();toast(count>0?`${count} despesa(s) lançada(s)`:'Já lançadas este mês');
}

function toggleFixedIncome(id){DATA.fixedIncomes=DATA.fixedIncomes.map(f=>f.id===id?{...f,active:!f.active}:f);save();renderPage();}
function delFixedIncome(id){DATA.fixedIncomes=DATA.fixedIncomes.filter(f=>f.id!==id);save();renderPage();}
function delVarIncome(id){DATA.variableIncomes=DATA.variableIncomes.filter(v=>v.id!==id);save();renderPage();}

function launchFixedIncome(){
  const d=today(),m=now().getMonth(),y=now().getFullYear();
  let count=0;
  DATA.fixedIncomes.filter(f=>f.active&&f.amount>0).forEach(f=>{
    const exists=DATA.transactions.some(t=>{const td=new Date(t.date);return td.getMonth()===m&&td.getFullYear()===y&&t.fixedId===f.id;});
    if(!exists){DATA.transactions.push({id:uid(),description:f.name,amount:f.amount,category:f.category,date:d,reason:'Receita fixa',fixedId:f.id});count++;}
  });
  save();renderPage();toast(count>0?`${count} receita(s) lançada(s)`:'Já lançadas este mês','var(--lcars-green)');
}

function addFixedIncome(){
  const catOpts=[['receita','⬆ Receita PJ'],['premiacao','🏆 Premiação/Bônus']];
  openModal('Nova Receita Fixa',
    field('Nome','fiName','text','','placeholder="Ex: Salário PJ, Pro-labore..."')+
    field('Valor Mensal (R$)','fiAmt','number','','placeholder="0,00"')+
    fieldSel('Tipo','fiCat',catOpts,'receita')+
    field('Dia de Recebimento','fiDay','number','5','min="1" max="31"'),
    ()=>{
      if(!val('fiName'))return false;
      if(!DATA.fixedIncomes)DATA.fixedIncomes=[];
      DATA.fixedIncomes.push({id:uid(),name:val('fiName'),amount:fval('fiAmt'),category:val('fiCat'),day:parseInt(val('fiDay'))||5,active:true});
      save();renderPage();toast('Receita fixa adicionada!','var(--lcars-green)');return true;
    });
}

function editFixedIncome(id){
  if(!DATA.fixedIncomes)return;
  const f=DATA.fixedIncomes.find(x=>x.id===id);if(!f)return;
  const catOpts=[['receita','⬆ Receita PJ'],['premiacao','🏆 Premiação/Bônus']];
  openModal('Editar Receita Fixa',
    field('Nome','fiName2','text',f.name)+
    field('Valor Mensal (R$)','fiAmt2','number',f.amount)+
    fieldSel('Tipo','fiCat2',catOpts,f.category)+
    field('Dia de Recebimento','fiDay2','number',f.day||5),
    ()=>{
      f.name=val('fiName2');f.amount=fval('fiAmt2');f.category=val('fiCat2');f.day=parseInt(val('fiDay2'))||5;
      save();renderPage();toast('Atualizado!','var(--lcars-green)');return true;
    });
}

function addVarIncome(){
  const catOpts=[['premiacao','🏆 Premiação/Bônus'],['receita','⬆ Receita PJ / Freela'],['outros','📦 Outro']];
  openModal('Registrar Receita Variável',
    field('Descrição','viName','text','','placeholder="Ex: Premiação Q1, Projeto freela XYZ..."')+
    field('Valor (R$)','viAmt','number','','placeholder="0,00"')+
    fieldSel('Tipo','viCat',catOpts,'premiacao')+
    field('Data de Recebimento','viDate','date',today())+
    fieldTA('Observação','viNote','','Contexto, origem, cliente...'),
    ()=>{
      if(!val('viName')||!fval('viAmt'))return false;
      if(!DATA.variableIncomes)DATA.variableIncomes=[];
      const vi={id:uid(),name:val('viName'),amount:fval('viAmt'),category:val('viCat'),date:val('viDate'),note:val('viNote')};
      DATA.variableIncomes.push(vi);
      // also log as transaction automatically
      DATA.transactions.push({id:uid(),description:vi.name,amount:vi.amount,category:vi.category,date:vi.date,reason:vi.note||'Receita variável'});
      save();renderPage();toast('Receita registrada!','var(--lcars-yellow)');return true;
    });
}

function setBudget(cat,v){DATA.budget[cat]=parseFloat(v)||0;save();}
function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`jeff_financeiro_backup_${today()}.json`;a.click();toast('Exportado!');
}
function importDataTrigger(){document.getElementById('importFile').click();}
function importData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{DATA=JSON.parse(e.target.result);save();renderPage();toast('Importado!');}catch{toast('Erro','var(--lcars-red)');}};
  r.readAsText(file);
}
function clearData(){
  if(confirm('Apagar TODOS os dados? Esta ação não pode ser desfeita.')){DATA=defaultData();save();renderPage();toast('Dados apagados','var(--lcars-red)');}
}

    field('Descrição','tDesc','text','','placeholder="Ex: NF cliente ABC, Mercado, Whey..."')+

    fieldSel('Categoria','tCat',catOpts,'alimentacao')+
    field('Data','tDate','date',today())+
    fieldTA('Motivo / Observação (opcional)','tReason','','Por que você gastou? Qual o contexto?'),
    ()=>{
      if(!val('tDesc')||!fval('tAmt'))return false;
      DATA.transactions.push({id:uid(),description:val('tDesc'),amount:fval('tAmt'),category:val('tCat'),date:val('tDate'),reason:val('tReason')});
      save();renderPage();toast('Lançado!');return true;

function addInvest(){
  const typeOpts=Object.entries(INVEST_TYPES).map(([k,v])=>[k,v.icon+' '+v.label]);

function addLoan(){
  openModal('Registrar Empréstimo / Dívida',
    `<div class="field"><label>Tipo</label><div class="toggle-row" style="margin-bottom:0">
      <button class="toggle-opt active" id="lTypeGave" onclick="setLoanType('gave')">Emprestei</button>

    field('Pessoa','lPerson','text','','placeholder="Nome"')+

    field('Descrição','lDesc','text','','placeholder="Por quê?"')+
    field('Data','lDate','date',today()),
    ()=>{
      if(!val('lPerson')||!fval('lAmt'))return false;
      const type=document.getElementById('lTypeGave')?.classList.contains('active')?'gave':'owe';

}

function addSplit(){
  const catOpts=Object.entries(CATS).filter(([k])=>k!=='receita'&&k!=='premiacao'&&k!=='investimento').map(([k,c])=>[k,c.icon+' '+c.label]);
  openModal('Dividir Conta',
    field('Descrição','spDesc','text','','placeholder="Ex: Conta de luz, Mercado..."')+
    field('Valor Total (R$)','spTotal','number','','placeholder="0,00" oninput="calcSplit()"')+
    fieldSel('Categoria','spCat',catOpts,'moradia')+
    field('Nº de Pessoas','spPeople','number','2','min="2" oninput="calcSplit()"')+
    `<div class="field"><label>Quem pagou?</label><div class="toggle-row" style="margin-bottom:0">
      <button class="toggle-opt active" id="spEu" onclick="setSplitPayer('eu')">Eu paguei</button>
      <button class="toggle-opt" id="spOutro" onclick="setSplitPayer('outro')">Outra pessoa</button>
    </div></div>`+
    `<div id="splitPreview" style="background:var(--bg4);border-left:3px solid var(--lcars-blue);padding:9px 12px;margin-bottom:12px;font-family:var(--font-head);font-size:11px;color:var(--lcars-blue);letter-spacing:.5px"></div>`+
    field('Data','spDate','date',today()),
    ()=>{
      if(!val('spDesc')||!fval('spTotal'))return false;
      const total=fval('spTotal'),people=parseInt(val('spPeople'))||2;
      const paidBy=document.getElementById('spEu')?.classList.contains('active')?'eu':'outro';
      const myShare=paidBy==='eu'?total-total/people:total/people;
      DATA.splits.push({id:uid(),description:val('spDesc'),total,people,paidBy,myShare,category:val('spCat'),date:val('spDate'),settled:false});
      save();renderPage();toast('Divisão registrada!');return true;
    });
}
function calcSplit(){
  const total=parseFloat(document.getElementById('spTotal')?.value)||0;
  const people=parseInt(document.getElementById('spPeople')?.value)||2;
  const isEu=document.getElementById('spEu')?.classList.contains('active');
  const share=isEu?total-total/people:total/people;
  const el=document.getElementById('splitPreview');
  if(el)el.textContent=total>0?`Sua parte: ${fmt(share)}`:'Preencha o valor acima';
}
function setSplitPayer(t){
  document.getElementById('spEu')?.classList.toggle('active',t==='eu');
  document.getElementById('spOutro')?.classList.toggle('active',t==='outro');
  calcSplit();
}

function addFixed(){
  const catOpts=Object.entries(CATS).filter(([k])=>k!=='receita'&&k!=='premiacao'&&k!=='investimento').map(([k,c])=>[k,c.icon+' '+c.label]);
  openModal('Nova Despesa Fixa',
    field('Nome','fxName','text','','placeholder="Ex: Plano de saúde, Streaming..."')+
    field('Valor Mensal (R$)','fxAmt','number','','placeholder="0,00"')+
    fieldSel('Categoria','fxCat',catOpts,'outros')+
    field('Dia de Vencimento','fxDay','number','10','min="1" max="31"')+
    `<div class="field"><label>Dividida com colega de quarto?</label><div class="toggle-row" style="margin-bottom:0">
      <button class="toggle-opt" id="fxShareY" onclick="setFixedShare(true)">Sim</button>
      <button class="toggle-opt active" id="fxShareN" onclick="setFixedShare(false)">Não</button>
    </div></div>`,
    ()=>{
      if(!val('fxName'))return false;
      const shared=document.getElementById('fxShareY')?.classList.contains('active');
      DATA.fixedExpenses.push({id:uid(),name:val('fxName'),amount:fval('fxAmt'),category:val('fxCat'),day:parseInt(val('fxDay'))||10,active:true,shared});
      save();renderPage();toast('Despesa fixa adicionada!');return true;
    });
}
function setFixedShare(v){
  document.getElementById('fxShareY')?.classList.toggle('active',v);
  document.getElementById('fxShareN')?.classList.toggle('active',!v);
}
function editFixed(id){
  const f=DATA.fixedExpenses.find(x=>x.id===id);if(!f)return;
  const catOpts=Object.entries(CATS).filter(([k])=>k!=='receita'&&k!=='premiacao'&&k!=='investimento').map(([k,c])=>[k,c.icon+' '+c.label]);
  openModal('Editar Despesa Fixa',
    field('Nome','fxName2','text',f.name)+field('Valor Mensal (R$)','fxAmt2','number',f.amount)+
    fieldSel('Categoria','fxCat2',catOpts,f.category)+field('Dia de Vencimento','fxDay2','number',f.day||10),
    ()=>{
      f.name=val('fxName2');f.amount=fval('fxAmt2');f.category=val('fxCat2');f.day=parseInt(val('fxDay2'))||10;
      save();renderPage();toast('Atualizado!');return true;
    });
}

// ─── FAB ─────────────────────────────────────────────────────────────────────
function attachFab(){
  const fab=document.getElementById('fabBtn');
  if(!fab)return;
  const actions={
    dashboard:addTransaction,timeline:addTransaction,invest:addInvest,
    loans:()=>loansTab==='loans'?addLoan():addSplit(),fixed:addFixed,settings:null,
  };
  const action=actions[currentView];
  fab.style.display=action?'flex':'none';
  fab.onclick=action||null;
}

// ─── HEADER DATE ─────────────────────────────────────────────────────────────
function updateHeaderDate(){
  const n=now();
  document.getElementById('headerDate').innerHTML=`${n.getDate()}<br>${MONTHS[n.getMonth()]}<br>${n.getFullYear()}`;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
updateHeaderDate();
renderNav();
renderPage();

// ─── PWA SERVICE WORKER (cache offline) ──────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'jeff-fin-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('Offline')))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ─── ANDROID INSTALL BANNER ──────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button after login
  setTimeout(showInstallBanner, 1200);
});

function showInstallBanner(){
  if(!deferredPrompt) return;
  if(document.getElementById('installBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = `
    position:fixed;bottom:72px;left:12px;right:12px;
    background:#0d0a1a;border-left:4px solid #ff9900;border-top:1px solid #ff990055;
    padding:12px 14px;z-index:500;display:flex;align-items:center;gap:12px;
    font-family:'Orbitron',monospace;animation:slideUp .3s ease;
  `;
  banner.innerHTML = `
    <svg width="22" height="27" viewBox="0 0 90 110" fill="none"><path d="M45 4 L84 88 Q84 94 78 96 L12 96 Q6 94 6 88 Z" stroke="#ff9900" stroke-width="5" fill="none"/><path d="M12 96 Q45 74 78 96" stroke="#ff9900" stroke-width="5" fill="none"/><path d="M45 18L49 42L62 36L50 50L62 64L49 58L45 82L41 58L28 64L40 50L28 36L41 42Z" fill="#ff9900"/></svg>
    <div style="flex:1">
      <div style="font-size:9px;color:#ff9900;letter-spacing:2px;margin-bottom:2px">INSTALAR COMO APP</div>
      <div style="font-size:11px;color:#8878aa;font-family:'Exo 2',sans-serif">Adicionar à tela inicial do Android</div>
    </div>
    <button onclick="installApp()" style="background:#ff9900;border:none;color:#080510;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;padding:8px 12px;cursor:pointer;letter-spacing:1px">INSTALAR</button>
    <button onclick="document.getElementById('installBanner').remove()" style="background:none;border:none;color:#3d3560;cursor:pointer;font-size:18px;padding:0 4px">✕</button>
  `;
  document.body.appendChild(banner);
}

async function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  const banner = document.getElementById('installBanner');
  if(banner) banner.remove();
  if(result.outcome === 'accepted') toast('App instalado! 🖖','var(--lcars-green)');
}
</script>
